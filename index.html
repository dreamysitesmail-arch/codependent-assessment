<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codependency Self-Reflection Assessment</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f6f8fc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--primary:#111827;
--primary-2:#334155;
--blue:#dbeafe;
--green:#dcfce7;
--orange:#fed7aa;
--red:#fecaca;
--shadow:0 10px 30px rgba(15,23,42,.08);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#f8fafc,#f1f5f9);
color:var(--text)
}

.wrap{max-width:980px;margin:0 auto;padding:24px}

.card{
background:var(--card);
border:1px solid rgba(226,232,240,.9);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:22px;
margin-bottom:18px
}

.hero{padding:28px}

h1{font-size:32px;margin-bottom:10px}

.muted{color:var(--muted);line-height:1.6}

.badges{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:14px
}

.badge{
padding:7px 11px;
border-radius:999px;
background:#eef2ff;
color:#334155;
font-size:12px;
font-weight:700
}

.progress{
height:12px;
border-radius:999px;
background:#e5e7eb;
overflow:hidden
}

.progress>div{
height:100%;
background:linear-gradient(90deg,var(--primary),var(--primary-2));
transition:width .2s ease
}

.question-shell{
text-align:center;
padding:28px
}

.question-text{
font-size:26px;
line-height:1.4;
max-width:760px;
margin:0 auto 22px;
font-weight:700
}

.scale{
display:grid;
grid-template-columns:repeat(6,minmax(70px,1fr));
gap:10px
}

.score-btn{
border:1px solid var(--border);
background:#fff;
border-radius:16px;
padding:14px 10px;
cursor:pointer;
font-weight:700
}

.score-btn.active{
background:var(--primary);
color:#fff
}

.btn-row{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:22px
}

.btn{
padding:12px 18px;
border-radius:14px;
border:1px solid var(--border);
background:#fff;
font-weight:700;
cursor:pointer
}

.btn.primary{
background:var(--primary);
color:#fff;
border-color:var(--primary)
}

.low{background:var(--green);color:#166534}
.mild{background:var(--blue);color:#1d4ed8}
.moderate{background:var(--orange);color:#c2410c}
.high{background:var(--red);color:#b91c1c}

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:14px
}

.chart-wrap{
background:#fff;
border:1px solid var(--border);
border-radius:14px;
padding:18px;
min-height:380px
}

.result-top{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:16px
}

.footer-note{
font-size:12px;
color:var(--muted);
margin-top:14px
}

@media(max-width:820px){
.scale{grid-template-columns:repeat(3,minmax(90px,1fr))}
.result-top,.grid{grid-template-columns:1fr}
.question-text{font-size:22px}
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const SCALE=[
{value:0,text:'Not true'},
{value:1,text:'Rarely'},
{value:2,text:'Sometimes'},
{value:3,text:'Often'},
{value:4,text:'Very often'},
{value:5,text:'Almost always'}
];

const test={
name:'Codependency Self-Reflection Assessment',

intro:'A 48-question self-reflection assessment exploring emotional dependence, boundaries, self-worth, people-pleasing patterns, and relationship behaviors.',

disclaimer:'This assessment is for educational self-reflection and is not a clinical diagnosis. For professional evaluation please consult a licensed mental health professional.',

thresholds:[60,120,180],

sectionMax:30,

sections:[

{
title:'Self-Worth',
cluster:'Identity',
questions:[
'I feel responsible for other people’s emotions.',
'My self-esteem depends on how others treat me.',
'I rely on validation from others to feel secure.',
'I struggle to feel confident when I am alone.',
'I often feel valuable only when others need me.',
'I sometimes lose my sense of identity in relationships.'
]
},

{
title:'People Pleasing',
cluster:'Approval',
questions:[
'I prioritize other people’s needs over my own.',
'I feel uncomfortable disappointing others.',
'I say yes even when I want to say no.',
'I try hard to keep everyone happy.',
'I worry people will not like me if I disagree.',
'I feel responsible for maintaining harmony in relationships.'
]
},

{
title:'Boundaries',
cluster:'Boundaries',
questions:[
'I feel guilty when setting boundaries.',
'I struggle to say no.',
'I allow others to cross my personal limits.',
'I worry people will leave if I set boundaries.',
'I tolerate behavior that makes me uncomfortable.',
'I avoid conflict even when I should speak up.'
]
},

{
title:'Emotional Dependence',
cluster:'Dependence',
questions:[
'My mood depends heavily on others.',
'I feel anxious when someone close to me is upset.',
'I fear losing important relationships.',
'I often seek reassurance from people I care about.',
'I feel empty when I am not in a relationship.',
'I feel incomplete without emotional support.'
]
},

{
title:'Rescuing Patterns',
cluster:'Helping',
questions:[
'I often try to fix other people’s problems.',
'I feel responsible for solving others’ issues.',
'I neglect my needs while helping others.',
'I feel useful when others depend on me.',
'I am drawn to people who need help.',
'I struggle to step back from others’ problems.'
]
},

{
title:'Relationship Patterns',
cluster:'Relationships',
questions:[
'I stay in unhealthy relationships too long.',
'I fear being alone even when a relationship is unhealthy.',
'I sacrifice my own well-being for relationships.',
'I tolerate behavior that hurts me emotionally.',
'I feel responsible for keeping relationships together.',
'I struggle to leave unhealthy relationships.'
]
},

{
title:'Control',
cluster:'Responsibility',
questions:[
'I feel responsible for other people’s happiness.',
'I try to prevent conflict by controlling situations.',
'I feel stressed when others make poor decisions.',
'I struggle to let others manage their own problems.',
'I worry about things outside my control.',
'I take responsibility for problems that are not mine.'
]
},

{
title:'Self-Care',
cluster:'Independence',
questions:[
'I struggle to prioritize my own needs.',
'I feel guilty taking time for myself.',
'I neglect self-care because I focus on others.',
'I rarely focus on my personal goals.',
'I often ignore my own well-being.',
'I find it difficult to focus on my own growth.'
]
}

]
};

const flatQuestions=[];
test.sections.forEach((section,sectionIndex)=>{
section.questions.forEach((q)=>{
flatQuestions.push({
sectionIndex,
sectionTitle:section.title,
cluster:section.cluster,
text:q
});
});
});

let answers=Array(flatQuestions.length).fill(null);
let currentIndex=0;
let radarChart=null;

function totalAnswered(){return answers.filter(v=>v!==null).length;}
function totalScore(){return answers.reduce((s,v)=>s+(v||0),0);}

function overallLevel(score){
const [a,b,c]=test.thresholds;
if(score<a)return'Low traits';
if(score<b)return'Mild traits';
if(score<c)return'Moderate traits';
return'High traits';
}

function pillClass(l){
if(l==='Low traits')return'low';
if(l==='Mild traits')return'mild';
if(l==='Moderate traits')return'moderate';
return'high';
}

function sectionScore(i){
return test.sections[i].questions.reduce((sum,_q,idx)=>{
const gi=test.sections.slice(0,i).reduce((a,s)=>a+s.questions.length,0)+idx;
return sum+(answers[gi]||0);
},0);
}

function renderQuiz(){

const q=flatQuestions[currentIndex];

document.getElementById('app').innerHTML=`
<div class="wrap">

<div class="card hero">
<h1>${test.name}</h1>
<p class="muted">${test.intro}</p>
</div>

<div class="card question-shell">

<div class="question-text">${q.text}</div>

<div class="scale">

${SCALE.map(item=>`
<button class="score-btn ${answers[currentIndex]===item.value?'active':''}" data-score="${item.value}">
${item.value}
</button>
`).join('')}

</div>

<div class="btn-row">

<button class="btn" id="prevBtn" ${currentIndex===0?'disabled':''}>Previous</button>

<button class="btn primary" id="nextBtn">${currentIndex===flatQuestions.length-1?'Results':'Next'}</button>

</div>

</div>

</div>
`;

document.querySelectorAll('[data-score]').forEach(btn=>{
btn.onclick=function(){
answers[currentIndex]=Number(this.getAttribute('data-score'));
renderQuiz();
};
});

document.getElementById('prevBtn').onclick=()=>{
if(currentIndex>0){
currentIndex--;
renderQuiz();
}
};

document.getElementById('nextBtn').onclick=()=>{
if(currentIndex<flatQuestions.length-1){
currentIndex++;
renderQuiz();
}else{
renderResults();
}
};

}

function renderResults(){

const score=totalScore();
const level=overallLevel(score);

document.getElementById('app').innerHTML=`
<div class="wrap">

<div class="card hero">

<h1>Your Results</h1>

<h2>${score} / ${flatQuestions.length*5}</h2>

<div class="${pillClass(level)} badge">${level}</div>

<p class="muted">${test.disclaimer}</p>

</div>

<div class="result-top">

<div class="card">

<h2>Section Breakdown</h2>

<div class="grid">

${test.sections.map((s,i)=>`
<div>
<strong>${s.title}</strong><br>
${sectionScore(i)} / 30
</div>
`).join('')}

</div>

</div>

<div class="card chart-wrap">

<canvas id="radarChart"></canvas>

</div>

</div>

</div>
`;

const labels=test.sections.map(s=>s.title);
const data=test.sections.map((s,i)=>sectionScore(i));

const ctx=document.getElementById('radarChart');

radarChart=new Chart(ctx,{
type:'radar',
data:{
labels,
datasets:[{
label:'Score',
data,
backgroundColor:'rgba(59,130,246,0.2)',
borderColor:'rgba(30,64,175,0.9)'
}]
},
options:{
responsive:true,
scales:{
r:{
min:0,
max:30
}
},
plugins:{
legend:{display:false}
}
}
});

}

renderQuiz();

</script>

</body>
</html>
